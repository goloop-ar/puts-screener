# Calendario macro 2026 - eventos relevantes para SOP Paso 3.
# Mantenido manualmente. Actualizar cada noviembre para el año siguiente.
#
# Fuentes oficiales:
#   - FOMC: https://www.federalreserve.gov/monetarypolicy/fomccalendars.htm
#   - CPI:  https://www.bls.gov/schedule/news_release/cpi.htm
#
# Las fechas de FOMC corresponden al segundo día de la reunión (cuando se publica
# statement + press conference). El primer día de cada reunión no se incluye porque
# no hay anuncio de prensa que mueva el mercado.
#
# Las fechas de CPI son las publicadas oficialmente por BLS a las 8:30 AM ET.
#
# Notas:
# - CPI febrero 2026: rescheduled del 11 al 13 por delay del shutdown 2025.
# - Todas las fechas de FOMC son verificadas contra federalreserve.gov.
# - Todas las fechas de CPI son verificadas contra bls.gov + White House PFEI calendar 2026.

events:
  # ──────────────────── FOMC 2026 ────────────────────
